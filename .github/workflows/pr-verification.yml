name: PR Verification

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          package_json_file: ./package.json
          cache: true
          cache_dependency_path: ./pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        run: pnpm run lint

      - name: Check frontend formatting
        run: pnpm run format:check

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: Run Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Build app (Tauri, no bundle)
        run: pnpm run tauri build

  system-tests:
    runs-on: ${{ matrix.platform }}
    # The Linux runner (Tauri's canonical WebDriver path via webkit2gtk-driver +
    # xvfb) is the authoritative, blocking check. The windows-latest runner is
    # kept for diagnostics but is non-blocking: creating a WebView2 WebDriver
    # session against tauri-driver hangs (POST /session times out after 120s with
    # IncompleteMessage) on the GitHub-hosted image even when msedgedriver matches
    # the WebView2 Runtime. The suite passes locally on Windows, so this is a
    # hosted-runner limitation rather than an application defect.
    continue-on-error: ${{ matrix.platform == 'windows-2022' }}
    timeout-minutes: 45
    needs: build
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-2022]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          package_json_file: ./package.json
          cache: true
          cache_dependency_path: '**/pnpm-lock.yaml'

      # Install the Linux system dependencies Tauri needs to compile, plus the
      # extra packages tauri-driver requires: webkit2gtk-driver (the WebKit
      # WebDriver) and xvfb (a virtual display so the app can run headless).
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            webkit2gtk-driver \
            xvfb

      # Install a matching Microsoft Edge WebDriver via msedgedriver-tool, which
      # downloads the driver version that matches the runner's WebView2 Runtime.
      - name: Install msedgedriver (Windows)
        if: matrix.platform == 'windows-2022'
        run: |
          cargo install --git https://github.com/chippers/msedgedriver-tool
          & "$HOME/.cargo/bin/msedgedriver-tool.exe"
          $PWD.Path >> $env:GITHUB_PATH

      - name: Install application dependencies
        run: pnpm install --frozen-lockfile

      - name: Install e2e dependencies
        run: pnpm install --frozen-lockfile
        working-directory: e2e

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      # On Linux we run through xvfb-run to provide a virtual display.
      - name: Run system tests (Linux)
        if: matrix.platform == 'ubuntu-latest'
        working-directory: e2e
        env:
          TAURI_TEST_KEEP_DATA: '1'
        run: xvfb-run --auto-servernum pnpm test

      - name: Run system tests (Windows)
        if: matrix.platform == 'windows-2022'
        working-directory: e2e
        env:
          TAURI_TEST_KEEP_DATA: '1'
        run: pnpm test

      - name: Upload system test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: system-test-artifacts-${{ matrix.platform }}-${{ github.run_id }}
          path: |
            e2e/.wdio-artifacts
            .system-test-data
          include-hidden-files: true
          if-no-files-found: ignore
          retention-days: 7

