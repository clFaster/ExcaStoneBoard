name: PR Verification

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          workspaces: src-tauri

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          package_json_file: ./package.json
          cache: true
          cache_dependency_path: ./pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        run: pnpm run lint

      - name: Check frontend formatting
        run: pnpm run format:check

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: Run Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

  build:
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            artifact: app-ubuntu
            binary: src-tauri/target/release/excastoneboard
          - platform: windows-2022
            artifact: app-windows
            binary: src-tauri/target/release/excastoneboard.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          workspaces: src-tauri

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          package_json_file: ./package.json
          cache: true
          cache_dependency_path: ./pnpm-lock.yaml

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev

      - name: Install application dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app (Tauri, no bundle)
        run: pnpm run tauri build --no-bundle

      - name: Upload app binary
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}
          if-no-files-found: error
          retention-days: 7

  system-tests:
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 30
    needs: [checks, build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            artifact: app-ubuntu
            binary: src-tauri/target/release/excastoneboard
          - platform: windows-2022
            artifact: app-windows
            binary: src-tauri/target/release/excastoneboard.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          workspaces: src-tauri

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          package_json_file: ./package.json
          cache: true
          cache_dependency_path: '**/pnpm-lock.yaml'

      # Install the runtime libraries required by the downloaded Tauri binary,
      # plus webkit2gtk-driver and xvfb for headless WebDriver sessions.
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            webkit2gtk-driver \
            xvfb

      # Install a matching Microsoft Edge WebDriver via msedgedriver-tool, which
      # downloads the driver version that matches the runner's WebView2 Runtime.
      - name: Install msedgedriver (Windows)
        if: matrix.platform == 'windows-2022'
        run: |
          cargo install --git https://github.com/chippers/msedgedriver-tool
          & "$HOME/.cargo/bin/msedgedriver-tool.exe"
          $PWD.Path >> $env:GITHUB_PATH

      - name: Install e2e dependencies
        run: pnpm install --frozen-lockfile
        working-directory: e2e

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Download app binary
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
          path: src-tauri/target/release

      # Artifact archives do not preserve executable permission bits.
      - name: Make app binary executable (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: chmod +x "${{ matrix.binary }}"

      # On Linux we run through xvfb-run to provide a virtual display.
      - name: Run system tests (Linux)
        if: matrix.platform == 'ubuntu-latest'
        working-directory: e2e
        env:
          TAURI_TEST_KEEP_DATA: '1'
          TAURI_APP_BINARY_PATH: ${{ github.workspace }}/${{ matrix.binary }}
        run: xvfb-run --auto-servernum pnpm test

      - name: Run system tests (Windows)
        if: matrix.platform == 'windows-2022'
        working-directory: e2e
        env:
          TAURI_TEST_KEEP_DATA: '1'
          TAURI_APP_BINARY_PATH: ${{ github.workspace }}/${{ matrix.binary }}
        run: pnpm test

      - name: Upload system test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: system-test-artifacts-${{ matrix.platform }}-${{ github.run_id }}
          path: |
            e2e/.wdio-artifacts
            .system-test-data
          include-hidden-files: true
          if-no-files-found: ignore
          retention-days: 7

