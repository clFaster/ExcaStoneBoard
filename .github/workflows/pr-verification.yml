name: PR Verification

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          package_json_file: ./package.json
          cache: true
          cache_dependency_path: ./pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        run: pnpm run lint

      - name: Check frontend formatting
        run: pnpm run format:check

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: Run Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Build app (Tauri, no bundle)
        run: pnpm run tauri build

  system-tests:
    runs-on: windows-latest
    timeout-minutes: 45
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          package_json_file: ./package.json
          cache: true
          cache_dependency_path: ./pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Ensure Edge WebDriver is available
        shell: pwsh
        run: |
          function Add-DriverToPath([string]$driverPath) {
            $driverDir = Split-Path $driverPath -Parent
            $driverDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            Write-Host "Using msedgedriver at: $driverPath"
          }

          # The Tauri app renders in the WebView2 Runtime, which updates
          # independently from the Edge browser on the runner image. msedgedriver
          # must match the WebView2 Runtime version or session creation hangs, so
          # derive the target version from the runtime first and only fall back to
          # the Edge browser version when the runtime cannot be detected.
          function Get-WebView2Version {
            $clientKeys = @(
              "HKLM:\SOFTWARE\WOW6432Node\Microsoft\EdgeUpdate\Clients\{F3017226-FE2A-4295-8BDF-00C3A9A7E4C5}",
              "HKLM:\SOFTWARE\Microsoft\EdgeUpdate\Clients\{F3017226-FE2A-4295-8BDF-00C3A9A7E4C5}",
              "HKCU:\SOFTWARE\Microsoft\EdgeUpdate\Clients\{F3017226-FE2A-4295-8BDF-00C3A9A7E4C5}"
            )
            foreach ($key in $clientKeys) {
              if (Test-Path $key) {
                $pv = (Get-ItemProperty -Path $key -ErrorAction SilentlyContinue).pv
                if ($pv) { return $pv }
              }
            }
            return $null
          }

          function Get-EdgeVersion {
            $edgeExe = "${env:ProgramFiles(x86)}\Microsoft\Edge\Application\msedge.exe"
            if (-not (Test-Path $edgeExe)) {
              $edgeExe = "${env:ProgramFiles}\Microsoft\Edge\Application\msedge.exe"
            }
            if (Test-Path $edgeExe) {
              return (Get-Item $edgeExe).VersionInfo.ProductVersion
            }
            return $null
          }

          $webView2Version = Get-WebView2Version
          $edgeVersion = Get-EdgeVersion
          Write-Host "Detected WebView2 Runtime version: $(if ($webView2Version) { $webView2Version } else { 'not found' })"
          Write-Host "Detected Edge browser version: $(if ($edgeVersion) { $edgeVersion } else { 'not found' })"

          $targetVersion = if ($webView2Version) { $webView2Version } else { $edgeVersion }
          if (-not $targetVersion) {
            throw "Could not determine WebView2 Runtime or Microsoft Edge version."
          }

          $majorVersion = $targetVersion.Split('.')[0]
          $driverDir = Join-Path $env:RUNNER_TEMP "msedgedriver"
          New-Item -ItemType Directory -Path $driverDir -Force | Out-Null
          $driverZipPath = Join-Path $driverDir "edgedriver.zip"
          $downloadHost = "https://msedgedriver.microsoft.com"

          # Prefer an exact match to the WebView2 Runtime, then the Edge browser
          # version, then the latest driver published for the major version.
          $candidateVersions = New-Object System.Collections.Generic.List[string]
          foreach ($candidate in @($targetVersion, $edgeVersion)) {
            if ($candidate -and -not $candidateVersions.Contains($candidate)) {
              $candidateVersions.Add($candidate)
            }
          }
          try {
            $latestReleaseResponse = Invoke-WebRequest -Uri "$downloadHost/LATEST_RELEASE_$majorVersion" -UseBasicParsing
            $latestReleaseRaw = $latestReleaseResponse.Content
            if ($latestReleaseRaw -is [byte[]]) {
              # LATEST_RELEASE files are UTF-16 encoded, so decode the raw bytes.
              $latestReleaseRaw = [System.Text.Encoding]::Unicode.GetString($latestReleaseRaw)
            }
            $latestRelease = ([string]$latestReleaseRaw -replace "[^0-9\.]", "").Trim()
            if ($latestRelease -and -not $candidateVersions.Contains($latestRelease)) {
              $candidateVersions.Add($latestRelease)
            }
          } catch {
            Write-Host "Could not resolve LATEST_RELEASE_${majorVersion}: $($_.Exception.Message)"
          }

          $downloaded = $false
          $errors = @()
          foreach ($version in $candidateVersions) {
            try {
              $driverZipUrl = "$downloadHost/$version/edgedriver_win64.zip"
              Write-Host "Attempting to download msedgedriver $version from $driverZipUrl"
              Invoke-WebRequest -Uri $driverZipUrl -OutFile $driverZipPath -UseBasicParsing

              Remove-Item (Join-Path $driverDir "msedgedriver.exe") -Force -ErrorAction SilentlyContinue
              Expand-Archive -Path $driverZipPath -DestinationPath $driverDir -Force

              $driverBinary = Join-Path $driverDir "msedgedriver.exe"
              if (Test-Path $driverBinary) {
                Add-DriverToPath $driverBinary
                & $driverBinary --version
                $downloaded = $true
                break
              }
            } catch {
              $errors += "${version}: $($_.Exception.Message)"
            }
          }

          if (-not $downloaded) {
            throw "Unable to install msedgedriver matching version(s) $($candidateVersions -join ', '). Attempts: $($errors -join ' | ')"
          }

      - name: Verify Edge WebDriver
        run: msedgedriver --version

      - name: Run system tests
        env:
          TAURI_TEST_KEEP_DATA: '1'
        run: pnpm run test:system

      - name: Upload system test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: system-test-artifacts-${{ github.run_id }}
          path: |
            .wdio-artifacts
            .system-test-data
          if-no-files-found: ignore
          retention-days: 7
